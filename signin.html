<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="bg-gray-400 w-full max-w-md p-8 rounded-xl shadow-lg">
        <div class="mb-6 text-center">
            <h5 class="text-2xl font-semibold">Sign In</h5>
        </div>
        <form action="#" class="space-y-4">
            <div>
                <label for="username" class="block mb-1">Username:</label>
                <input type="text" id="username" class="w-full border border-gray-300 rounded-lg px-3 py-2">
            </div>
            <div>
                <label for="password" class="block mb-1">Password:</label>
                <input type="password" id="password" class="w-full border border-gray-300 rounded-lg px-3 py-2">
            </div>
            <button type="submit" class="w-full text-white bg-gray-600 hover:bg-gray-400 rounded-lg px-4 py-2">Log
                In</button>
        </form>
        <p>Create new account?<a href="./signup.html" class="text-black font-semibold hover:underline">signup</a></p>
    </div>

<script src="src/login.js"></script>
</body>
</html>
