<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-gray-400 w-full max-w-md p-8 rounded-xl shadow-lg">
        <div class="mb-6 text-center">
            <h5 class="text-2xl font-semibold">Sign Up</h5>
        </div>
        <form action="#" class="space-y-4">
            <div>
                <label for="fullname" class="block mb-1">Full Name:</label>
                <input type="text" id="fullname" class="w-full border border-black rounded-lg px-3 py-2"
                    placeholder="Enter your full name">
            </div>
            <div>
                <label for="email" class="block mb-1">Email:</label>
                <input type="email" id="email" class="w-full border border-black rounded-lg px-3 py-2"
                    placeholder="Enter your email">
            </div>
            <div>
                <label for="username" class="block mb-1">Username:</label>
                <input type="text" id="username" class="w-full border border-black rounded-lg px-3 py-2"
                    placeholder="Choose a username">
            </div>
            <div>
                <label for="password" class="block mb-1">Password:</label>
                <input type="password" id="password" class="w-full border border-black rounded-lg px-3 py-2"
                    placeholder="Create a password">
            </div>
            <div>
                <label for="confirm-password" class="block mb-1">Confirm Password:</label>
                <input type="password" id="confirm-password" class="w-full border border-black rounded-lg px-3 py-2"
                    placeholder="Confirm your password">
            </div>
            <button type="submit" class="w-full text-white bg-gray-600 hover:bg-gray-400 rounded-lg px-4 py-2">Create
                Account</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-700">
            Already have an account? <a href="./signin.html" class="text-black font-semibold hover:underline">Sign
                In</a>
        </p>
    </div>

    <script>
        const form = document.querySelector("form");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            // Get values
            const fullname = document.getElementById("fullname").value.trim();
            const email = document.getElementById("email").value.trim();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const confirmPassword = document.getElementById("confirm-password").value.trim();

            if (!fullname || !email || !username || !password || !confirmPassword) {
                alert("Please fill all fields");
                return;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            let users = JSON.parse(localStorage.getItem("users")) || [];
            const userExists = users.find(user => user.username === username);

            if (userExists) {
                alert("Username already taken");
                return;
            }
            const newUser = {
                fullname,
                email,
                username,
                password
            };
            users.push(newUser);
            localStorage.setItem("users", JSON.stringify(users));
            alert("Account created successfully ");
            location.href = "index.html";
        });
    </script>
</body>

</html>
